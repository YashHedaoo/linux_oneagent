name: Deploy Dynatrace OneAgent

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    paths:
      - "scripts/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      target_hosts:
        description: 'Server Hostname(s) or IP(s) to install on (e.g. srv-app-01.internal or 192.168.1.10,192.168.1.11). Leave blank to use TARGET_HOSTS secret.'
        required: false
        type: string
        default: ''
      runner:
        description: 'GitHub Runner type (ubuntu-latest for cloud + bastion, self-hosted for internal network)'
        required: true
        type: choice
        options:
          - ubuntu-latest
          - self-hosted
        default: ubuntu-latest
      installer_flags:
        description: 'Custom installer flags (optional)'
        required: false
        type: string
        default: '--set-infra-only=false --set-app-log-content-access=true'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}

    # Protect prod with a manual approval gate. Configure required reviewers
    # under Settings → Environments → production in your GitHub repo.
    environment:
      name: production
      url: https://app.dynatrace.com

    env:
      DT_PAAS_TOKEN: ${{ secrets.DT_PAAS_TOKEN }}
      ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
      ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
      SSH_USER: ${{ secrets.SSH_USER || 'ubuntu' }}
      BASTION_HOST: ${{ secrets.BASTION_HOST }}
      BASTION_USER: ${{ secrets.BASTION_USER || secrets.SSH_USER || 'ubuntu' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH Private Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        if: ${{ env.SSH_PRIVATE_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "SSH_PRIVATE_KEY_PATH=~/.ssh/id_rsa" >> $GITHUB_ENV

      - name: Deploy Dynatrace OneAgent via SSH
        if: github.event_name != 'pull_request'
        run: |
          INPUT_HOSTS="${{ inputs.target_hosts }}"
          SECRET_HOSTS='${{ secrets.TARGET_HOSTS }}'
          TARGET_HOSTS="${INPUT_HOSTS:-$SECRET_HOSTS}"

          if [ -z "$TARGET_HOSTS" ]; then
            echo "Error: No target hosts specified in workflow input or TARGET_HOSTS secret!"
            exit 1
          fi

          export TARGET_HOSTS
          if [ -n "${{ inputs.installer_flags }}" ]; then
            export DT_INSTALLER_FLAGS="${{ inputs.installer_flags }}"
          fi

          ./scripts/deploy.sh